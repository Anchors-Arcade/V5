<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V5</title>
  <meta name="description" content="Bästa spelen" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7426183460653362"
     crossorigin="anonymous"></script>
  <style>
    :root{--bg0:#050008;--p0:#7b2cff;--p1:#b56cff;--w:#f5f0ff;--m:#c9b9ff;--line:rgba(181,108,255,.18);--glass:rgba(12,6,24,.55)}
    *{box-sizing:border-box}html,body{margin:0;height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg0);color:var(--w);overflow-x:hidden}
    .bg{position:fixed;inset:0;z-index:-1;background-image:linear-gradient(rgba(123,44,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(123,44,255,.07) 1px,transparent 1px);background-size:40px 40px}
    .topbar{position:fixed;top:0;left:0;right:0;height:64px;z-index:500;display:flex;align-items:center;padding:0 16px;gap:12px;background:rgba(5,0,8,.88);border-bottom:1px solid var(--line)}
    .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:24px}.brand img{width:30px;height:30px}
    .searchRow{position:fixed;top:74px;left:50%;transform:translateX(-50%);width:min(1220px,95vw);z-index:450;background:var(--glass);border:1px solid var(--line);border-radius:14px;padding:10px;display:flex;gap:8px;align-items:center}
    .searchRow input,.searchRow select{background:rgba(255,255,255,.07);border:1px solid var(--line);color:#fff;border-radius:10px;padding:10px 12px}
    .searchRow input{flex:1;min-width:140px}
    .main{padding-top:140px;max-width:1240px;margin:0 auto;padding-left:16px;padding-right:16px;padding-bottom:30px}
    .hero{text-align:center;padding:20px 0 10px}.hero h1{margin:0;font-size:clamp(34px,6vw,64px);font-weight:900;background:linear-gradient(135deg,var(--w),var(--p1),var(--p0));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    #featuredZonesWrapper,#featuredZones{display:none!important}
    summary{font-size:30px;font-weight:900;margin:8px 0 12px}
    #container{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}
    .zone-item{background:#141c2b;border:1px solid #28344f;border-radius:14px;overflow:hidden;transition:.2s}
    .zone-item:hover{transform:translateY(-3px);border-color:#4f6bb2}
    .zone-item img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
    .zone-item button{width:100%;text-align:left;border:0;background:transparent;color:#fff;padding:10px;cursor:pointer;font-weight:600}
    #zoneViewer{display:none;position:fixed;inset:0;z-index:9999;background:#050008}
    .zone-header{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid var(--line);background:rgba(5,0,8,.9);gap:10px;flex-wrap:wrap}
    .zone-controls{display:flex;gap:8px;flex-wrap:wrap}.zone-controls button{background:rgba(123,44,255,.18);color:#fff;border:1px solid var(--line);border-radius:20px;padding:8px 12px;cursor:pointer}
    #zoneFrame{width:100%;height:calc(100% - 76px);border:0}
    #zoneAuthor{display:none!important}
  </style>
</head>
<body class="dark-mode">
  <div class="bg"></div>
  <header class="topbar">
    <div class="brand"><img src="favicon.png" alt="logo">Anchor Arcade V5 (BETA)</div>
  </header>

  <div class="searchRow">
    <input type="text" id="searchBar" placeholder="Search games..." oninput="filterZones()">
    <select id="sortOptions" onchange="sortZones()"><option value="name" selected>A-Z</option><option value="id">ID</option><option value="popular">Popular</option></select>
    <button id="settings" style="display:none" aria-hidden="true"></button>
  </div>

  <main class="main">
    <section class="hero"><h1>Anchor Arcade V5 (BETA</h1></section>
    <details id="featuredZonesWrapper" open><summary id="allZonesSummary"></summary><div id="featuredZones"></div></details>
    <details id="allZonesWrapper" open><summary id="allSummary">All Games:</summary><div id="container">Loading...</div></details>
  </main>

  <div id="zoneViewer"><div class="zone-header"><div class="zone-title"><h2 id="zoneName">zone</h2><span id="zoneId" style="display:none"></span><a id="zoneAuthor" href="#" target="_blank">by Author</a></div><div class="zone-controls"><button onclick="fullscreenZone()">Fullscreen</button><button onclick="aboutBlank()">Open in New Tab</button><button onclick="closeZone()">Close</button></div></div><iframe id="zoneFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-downloads"></iframe></div>
  <div id="popupOverlay"><div class="popup"><div id="popupBody"></div></div></div>

  <script>
  (function(){
    const safeOpen=(url)=>{try{const u=new URL(url,location.href);return u.href==='about:blank';}catch{return false;}};
    const origOpen=window.open.bind(window);
    window.open=function(url,target,features){ if(safeOpen(url||'')) return origOpen(url,target,features); return null; };
    const oa=window.location.assign.bind(window.location), orp=window.location.replace.bind(window.location);
    const safeNav=(url)=>{try{const u=new URL(url,location.href);return u.origin===location.origin||u.protocol==='about:';}catch{return false;}};
    window.location.assign=function(url){ if(safeNav(url)) oa(url); };
    window.location.replace=function(url){ if(safeNav(url)) orp(url); };
    document.addEventListener('click',function(e){const a=e.target.closest&&e.target.closest('a[href]'); if(!a) return; const href=a.getAttribute('href')||''; if(!href||href.startsWith('#')||href.startsWith('javascript:')) return; if(!safeNav(href)){e.preventDefault();e.stopPropagation();}},true);
  })();
  </script>
  <script src="script.js"></script>
  <script>window.addEventListener('load',()=>{document.getElementById('sortOptions').value='name';});
    const lockFrame=()=>{const f=document.getElementById("zoneFrame"); if(f){f.setAttribute("sandbox","allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-downloads");}};
    setInterval(lockFrame,500);
</script>
</body>
</html>
